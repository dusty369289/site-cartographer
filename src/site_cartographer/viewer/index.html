<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>site-cartographer viewer</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; }
  #app {
    display: grid;
    grid-template-columns: 1fr 4px var(--panel-w, 480px);
    height: 100vh;
  }
  #divider {
    background: #2a2a2a;
    cursor: col-resize;
    transition: background 100ms;
    position: relative;
  }
  #divider:hover, #divider.dragging { background: #6ab0ff; }
  #divider::after {
    content: ""; position: absolute; inset: 0 -3px;  /* widen hit area */
  }
  #cy { background: #111; position: relative; overflow: hidden; }
  #thumbnail-overlay {
    position: absolute; inset: 0; pointer-events: none;
    z-index: 3;  /* sit above Sigma's WebGL canvas */
  }
  #cy-loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #888; font-size: 14px; pointer-events: none;
    background: #111; z-index: 5;
  }
  #cy-loading .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Floating layout-control panel */
  #layout-panel {
    position: absolute; top: 8px; left: 8px;
    background: rgba(20,20,24,0.95); color: #ddd;
    border: 1px solid #333; border-radius: 6px;
    padding: 0; font-size: 11px; min-width: 240px;
    z-index: 10;
  }
  #layout-panel header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; cursor: pointer;
    background: #1a1a1a; border-radius: 6px 6px 0 0;
    border-bottom: 1px solid #333;
  }
  #layout-panel header span { font-weight: 600; color: #aaa; }
  #layout-panel.collapsed .body { display: none; }
  #layout-panel.collapsed header { border-bottom: 0; border-radius: 6px; }
  #layout-panel .body { padding: 10px; }
  #layout-panel .row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  #layout-panel .row label { flex: 0 0 96px; color: #aaa; }
  #layout-panel .row input[type=range] { flex: 1; }
  #layout-panel .row .val {
    flex: 0 0 50px; color: #6ab0ff; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  #layout-panel .actions { display: flex; gap: 6px; margin-top: 8px; }
  #layout-panel button {
    flex: 1; padding: 5px; background: #2a3a4a; color: #def;
    border: 1px solid #456; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  #layout-panel button:hover { background: #345; }
  #layout-panel button:disabled { opacity: 0.4; cursor: wait; }
  #layout-panel button.secondary { background: #222; color: #888; border-color: #333; }
  #layout-progress {
    margin-top: 8px; height: 4px; background: #222; border-radius: 2px; overflow: hidden;
    display: none;
  }
  #layout-progress .bar { height: 100%; background: #6ab0ff; width: 0%; transition: width 80ms linear; }

  #panel { display: flex; flex-direction: column; border-left: 1px solid #333; background: #1a1a1a; color: #eee; }
  #panel-header {
    padding: 8px 12px; background: #222; border-bottom: 1px solid #333; font-size: 13px;
    display: flex; align-items: center; gap: 10px;
  }
  #panel-header a { color: #6ab0ff; text-decoration: none; word-break: break-all; }
  #panel-header .home-btn {
    flex: 0 0 auto;
    color: #999;
    text-decoration: none;
    padding: 2px 9px;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.4;
    background: #1a1a1a;
    transition: border-color 100ms, color 100ms;
  }
  #panel-header .home-btn:hover { color: #6ab0ff; border-color: #6ab0ff; text-decoration: none; }
  #panel-header #panel-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  #panel-tabs { display: flex; background: #181818; border-bottom: 1px solid #333; }
  #panel-tabs .tab {
    flex: 1; padding: 8px 12px; background: transparent; color: #888;
    border: 0; border-right: 1px solid #2a2a2a; cursor: pointer;
    font-size: 12px; font-family: inherit;
  }
  #panel-tabs .tab:last-child { border-right: 0; }
  #panel-tabs .tab.active { color: #6ab0ff; background: #1a1a1a; border-bottom: 2px solid #6ab0ff; }
  #panel-tabs .tab:hover:not(.active) { color: #ccc; }
  .tab-content { display: none; flex: 1; flex-direction: column; min-height: 0; }
  .tab-content.active { display: flex; }
  #panel-controls { padding: 6px 12px; background: #181818; border-bottom: 1px solid #333; font-size: 12px; }
  #panel-controls label { margin-right: 12px; }
  #frame-wrap { position: relative; flex: 1; overflow: hidden; background: #000; }
  #page-iframe { width: 100%; height: 100%; border: 0; background: #fff; }
  #empty-msg { padding: 16px; color: #777; }
  #stats { padding: 6px 12px; font-size: 11px; color: #888; border-top: 1px solid #333; }

  /* Metadata tab */
  #tab-metadata { padding: 0; overflow-y: auto; }
  #tab-metadata .meta-block { padding: 12px; border-bottom: 1px solid #2a2a2a; }
  #tab-metadata h3 {
    margin: 0 0 8px 0; font-size: 11px; font-weight: 600;
    color: #888; text-transform: uppercase; letter-spacing: 0.05em;
  }
  #tab-metadata dl { margin: 0; display: grid; grid-template-columns: 120px 1fr; gap: 4px 12px; font-size: 12px; }
  #tab-metadata dt { color: #888; }
  #tab-metadata dd { margin: 0; color: #ddd; word-break: break-all; }
  #tab-metadata dd.url { color: #6ab0ff; }
  #tab-metadata details { margin: 0; padding: 8px 12px; border-bottom: 1px solid #2a2a2a; }
  #tab-metadata details summary {
    cursor: pointer; font-size: 12px; color: #aaa; padding: 4px 0;
    list-style: none; outline: 0; user-select: none;
  }
  #tab-metadata details summary::before {
    content: "▸ "; color: #666; display: inline-block; width: 14px;
  }
  #tab-metadata details[open] summary::before { content: "▾ "; }
  #tab-metadata summary .count { color: #6ab0ff; font-weight: 600; }
  #tab-metadata details ul { margin: 6px 0 0 18px; padding: 0; list-style: none; max-height: 240px; overflow-y: auto; }
  #tab-metadata details li {
    padding: 3px 0; font-size: 11px; color: #bbb;
    word-break: break-all;
  }
  #tab-metadata details li .lnk {
    color: #6ab0ff; cursor: pointer; text-decoration: none;
  }
  #tab-metadata details li .lnk:hover { text-decoration: underline; }
  #tab-metadata details li .meta { color: #666; font-size: 10px; margin-left: 6px; }
  #tab-metadata .badge {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 10px; background: #333; color: #aaa; margin-right: 4px;
  }
  #tab-metadata .badge.archived { background: #2a3a4f; color: #6ab0ff; }
  #tab-metadata .badge.external { background: #4a3f2a; color: #d9b35f; }
  #tab-metadata .badge.phantom { background: #4a2a2a; color: #d97a7a; }
  #tab-metadata .badge.unvisited { background: #333; color: #888; }
  #tab-metadata .empty { color: #666; font-style: italic; padding: 4px 18px; font-size: 11px; }
</style>
</head>
<body>
<div id="app">
  <div id="cy">
    <canvas id="thumbnail-overlay"></canvas>
    <div id="cy-loading"><span class="spin">◴</span>&nbsp; loading graph…</div>

    <div id="layout-panel">
      <header onclick="document.getElementById('layout-panel').classList.toggle('collapsed')">
        <span>layout controls</span>
        <span style="color:#666;font-size:10px;">click to toggle</span>
      </header>
      <div class="body">
        <div class="row">
          <label>link distance</label>
          <input type="range" id="param-link-distance" min="10" max="300" value="60" step="5" />
          <span class="val" id="val-link-distance">60</span>
        </div>
        <div class="row">
          <label>repulsion</label>
          <input type="range" id="param-charge" min="10" max="2000" value="200" step="10" />
          <span class="val" id="val-charge">-200</span>
        </div>
        <div class="row">
          <label>collide radius</label>
          <input type="range" id="param-collide" min="0" max="50" value="12" step="1" />
          <span class="val" id="val-collide">12</span>
        </div>
        <div class="row">
          <label>centering</label>
          <input type="range" id="param-center" min="0" max="100" value="5" step="1" />
          <span class="val" id="val-center">0.05</span>
        </div>
        <div class="row">
          <label>convergence</label>
          <input type="range" id="param-decay" min="5" max="50" value="22" step="1" />
          <span class="val" id="val-decay">0.022</span>
        </div>
        <div class="row">
          <label>cluster pull</label>
          <input type="range" id="param-cluster" min="0" max="100" value="40" step="1" />
          <span class="val" id="val-cluster">0.40</span>
        </div>
        <div class="row">
          <label>hub softening</label>
          <input type="range" id="param-hub-soften" min="0" max="100" value="80" step="1" />
          <span class="val" id="val-hub-soften">80%</span>
        </div>
        <div class="row">
          <label>color by</label>
          <select id="param-color-by" style="flex:1;background:#222;color:#ddd;border:1px solid #444;font-size:11px;">
            <option value="type">type (archived/external/…)</option>
            <option value="community" selected>community</option>
          </select>
        </div>
        <div class="row">
          <label>show thumbnails</label>
          <input type="checkbox" id="param-thumbnails" checked style="flex:0 0 auto;" />
        </div>
        <div class="actions">
          <button id="layout-run">re-compute layout</button>
          <button id="layout-stop" class="secondary" disabled>stop</button>
        </div>
        <div id="layout-progress"><div class="bar"></div></div>
      </div>
    </div>
  </div>

  <div id="divider" title="drag to resize"></div>

  <div id="panel">
    <div id="panel-header">
      <a class="home-btn" href="/" title="back to home menu">← home</a>
      <span id="panel-title">site-cartographer</span>
    </div>
    <div id="panel-tabs">
      <button class="tab active" data-tab="page">page</button>
      <button class="tab" data-tab="metadata">metadata</button>
    </div>
    <div id="tab-page" class="tab-content active">
      <div id="panel-controls">
        <label><input type="checkbox" id="toggle-highlights" checked> highlight links</label>
        <a id="open-page" href="#" target="_blank" style="color:#6ab0ff;display:none;">open original URL</a>
      </div>
      <div id="frame-wrap">
        <div id="empty-msg">click a node to view its page</div>
        <iframe id="page-iframe" style="display:none;"></iframe>
      </div>
    </div>
    <div id="tab-metadata" class="tab-content">
      <div id="meta-empty" class="meta-block" style="color:#666;font-style:italic;">
        click a node to see its metadata.
      </div>
      <div id="meta-body" style="display:none;">
        <div class="meta-block">
          <h3>identity</h3>
          <dl id="meta-identity"></dl>
        </div>
        <details id="meta-aliases-wrap" style="display:none;" open>
          <summary>aliases <span class="count" id="meta-aliases-count">0</span></summary>
          <ul id="meta-aliases"></ul>
        </details>
        <details id="meta-out-wrap">
          <summary>links out <span class="count" id="meta-out-count">0</span></summary>
          <ul id="meta-out"></ul>
        </details>
        <details id="meta-in-wrap">
          <summary>links in <span class="count" id="meta-in-count">0</span></summary>
          <ul id="meta-in"></ul>
        </details>
      </div>
    </div>
    <div id="stats"></div>
  </div>
</div>
<script src="graphology.umd.min.js"></script>
<script src="sigma.min.js"></script>
<script src="d3-dispatch.min.js"></script>
<script src="d3-timer.min.js"></script>
<script src="d3-quadtree.min.js"></script>
<script src="d3-force.min.js"></script>
<script src="viewer.js"></script>
</body>
</html>
