<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>site-cartographer viewer</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; }
  #app { display: grid; grid-template-columns: 1fr 480px; height: 100vh; }
  #cy { background: #111; position: relative; overflow: hidden; }
  #thumbnail-overlay {
    position: absolute; inset: 0; pointer-events: none;
    z-index: 3;  /* sit above Sigma's WebGL canvas */
  }
  #cy-loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #888; font-size: 14px; pointer-events: none;
    background: #111; z-index: 5;
  }
  #cy-loading .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Floating layout-control panel */
  #layout-panel {
    position: absolute; top: 8px; left: 8px;
    background: rgba(20,20,24,0.95); color: #ddd;
    border: 1px solid #333; border-radius: 6px;
    padding: 0; font-size: 11px; min-width: 240px;
    z-index: 10;
  }
  #layout-panel header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; cursor: pointer;
    background: #1a1a1a; border-radius: 6px 6px 0 0;
    border-bottom: 1px solid #333;
  }
  #layout-panel header span { font-weight: 600; color: #aaa; }
  #layout-panel.collapsed .body { display: none; }
  #layout-panel.collapsed header { border-bottom: 0; border-radius: 6px; }
  #layout-panel .body { padding: 10px; }
  #layout-panel .row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  #layout-panel .row label { flex: 0 0 96px; color: #aaa; }
  #layout-panel .row input[type=range] { flex: 1; }
  #layout-panel .row .val {
    flex: 0 0 50px; color: #6ab0ff; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  #layout-panel .actions { display: flex; gap: 6px; margin-top: 8px; }
  #layout-panel button {
    flex: 1; padding: 5px; background: #2a3a4a; color: #def;
    border: 1px solid #456; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  #layout-panel button:hover { background: #345; }
  #layout-panel button:disabled { opacity: 0.4; cursor: wait; }
  #layout-panel button.secondary { background: #222; color: #888; border-color: #333; }
  #layout-progress {
    margin-top: 8px; height: 4px; background: #222; border-radius: 2px; overflow: hidden;
    display: none;
  }
  #layout-progress .bar { height: 100%; background: #6ab0ff; width: 0%; transition: width 80ms linear; }

  #panel { display: flex; flex-direction: column; border-left: 1px solid #333; background: #1a1a1a; color: #eee; }
  #panel-header { padding: 8px 12px; background: #222; border-bottom: 1px solid #333; font-size: 13px; }
  #panel-header a { color: #6ab0ff; text-decoration: none; word-break: break-all; }
  #panel-controls { padding: 6px 12px; background: #181818; border-bottom: 1px solid #333; font-size: 12px; }
  #panel-controls label { margin-right: 12px; }
  #frame-wrap { position: relative; flex: 1; overflow: hidden; background: #000; }
  #page-iframe { width: 100%; height: 100%; border: 0; background: #fff; }
  #empty-msg { padding: 16px; color: #777; }
  #stats { padding: 6px 12px; font-size: 11px; color: #888; border-top: 1px solid #333; }
</style>
</head>
<body>
<div id="app">
  <div id="cy">
    <canvas id="thumbnail-overlay"></canvas>
    <div id="cy-loading"><span class="spin">◴</span>&nbsp; loading graph…</div>

    <div id="layout-panel">
      <header onclick="document.getElementById('layout-panel').classList.toggle('collapsed')">
        <span>layout controls</span>
        <span style="color:#666;font-size:10px;">click to toggle</span>
      </header>
      <div class="body">
        <div class="row">
          <label>link distance</label>
          <input type="range" id="param-link-distance" min="10" max="300" value="60" step="5" />
          <span class="val" id="val-link-distance">60</span>
        </div>
        <div class="row">
          <label>repulsion</label>
          <input type="range" id="param-charge" min="10" max="2000" value="200" step="10" />
          <span class="val" id="val-charge">-200</span>
        </div>
        <div class="row">
          <label>collide radius</label>
          <input type="range" id="param-collide" min="0" max="50" value="12" step="1" />
          <span class="val" id="val-collide">12</span>
        </div>
        <div class="row">
          <label>centering</label>
          <input type="range" id="param-center" min="0" max="100" value="5" step="1" />
          <span class="val" id="val-center">0.05</span>
        </div>
        <div class="row">
          <label>convergence</label>
          <input type="range" id="param-decay" min="5" max="50" value="22" step="1" />
          <span class="val" id="val-decay">0.022</span>
        </div>
        <div class="row">
          <label>cluster pull</label>
          <input type="range" id="param-cluster" min="0" max="100" value="40" step="1" />
          <span class="val" id="val-cluster">0.40</span>
        </div>
        <div class="row">
          <label>hub softening</label>
          <input type="range" id="param-hub-soften" min="0" max="100" value="80" step="1" />
          <span class="val" id="val-hub-soften">80%</span>
        </div>
        <div class="row">
          <label>color by</label>
          <select id="param-color-by" style="flex:1;background:#222;color:#ddd;border:1px solid #444;font-size:11px;">
            <option value="type">type (archived/external/…)</option>
            <option value="community" selected>community</option>
          </select>
        </div>
        <div class="row">
          <label>show thumbnails</label>
          <input type="checkbox" id="param-thumbnails" checked style="flex:0 0 auto;" />
        </div>
        <div class="actions">
          <button id="layout-run">re-compute layout</button>
          <button id="layout-stop" class="secondary" disabled>stop</button>
        </div>
        <div id="layout-progress"><div class="bar"></div></div>
      </div>
    </div>
  </div>

  <div id="panel">
    <div id="panel-header"><span id="panel-title">site-cartographer</span></div>
    <div id="panel-controls">
      <label><input type="checkbox" id="toggle-highlights" checked> highlight links</label>
      <a id="open-page" href="#" target="_blank" style="color:#6ab0ff;display:none;">open original URL</a>
    </div>
    <div id="frame-wrap">
      <div id="empty-msg">click a node to view its page</div>
      <iframe id="page-iframe" style="display:none;"></iframe>
    </div>
    <div id="stats"></div>
  </div>
</div>
<script src="graphology.umd.min.js"></script>
<script src="sigma.min.js"></script>
<script src="d3-dispatch.min.js"></script>
<script src="d3-timer.min.js"></script>
<script src="d3-quadtree.min.js"></script>
<script src="d3-force.min.js"></script>
<script src="viewer.js"></script>
</body>
</html>
